<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جامعة حلوان التكنولوجية الدولية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .header-section { background-color: #1a375d; color: #e6c260; padding: 20px; text-align: center; position: relative; min-height: 130px; border-radius: 10px 10px 0 0; }
        .main-card { border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 20px; }
        .btn-custom { background-color: #1a375d; color: white; font-weight: bold; }
        .table-custom { direction: rtl; text-align: center; }
        .badge { font-size: 0.9rem; padding: 5px 10px; }
    </style>
</head>
<body class="py-5">
<div class="container col-md-8">
    <div class="card main-card">
        <div class="header-section">
            <img src="logo1.jpeg" alt="Logo" style="position: absolute; right: 15px; top: 15px; width: 70px; height: 70px; border-radius: 50%; border: 2px solid #e6c260; object-fit: cover;">
            <img src="logo2.jpeg" alt="Logo" style="position: absolute; left: 15px; top: 15px; width: 70px; height: 70px; border-radius: 50%; border: 2px solid #e6c260; object-fit: cover;">
            
            <h4 style="margin-top: 5px;">جامعة حلوان التكنولوجية الدولية</h4>
            <p>كلية التكنولوجيا بالقاهرة</p>
            <small>نظام استعلام نتائج الطلاب الإلكتروني</small>
        </div>
        
        <div class="card-body p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">برجاء إدخال رقم الجلوس للاستعلام:</label>
                    <input type="text" name="seat_no" class="form-control" placeholder="أدخل رقم الجلوس هنا" required>
                </div>
                <button type="submit" class="btn btn-custom w-100">عرض النتيجة الحالية 🔍</button>
            </form>
        </div>
    </div>

    <div class="card main-card">
        <div class="card-header bg-light">دليل دلالات الرموز</div>
        <table class="table table-bordered table-custom mb-0">
            <thead>
                <tr><th>الرمز</th><th>التقدير</th></tr>
            </thead>
            <tbody>
                <tr><td>م</td><td>ممتاز</td></tr>
                <tr><td>جج</td><td>جيد جداً</td></tr>
                <tr><td>ج</td><td>جيد</td></tr>
                <tr><td>ق</td><td>مقبول</td></tr>
                <tr class="table-danger"><td>ض</td><td>ضعيف / راسب</td></tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
